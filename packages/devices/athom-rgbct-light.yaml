packages:
  - !include ../common.yaml

esp8266:
  board: esp8285
  restore_from_flash: true

output:
  - platform: esp8266_pwm
    id: red_output
    pin: GPIO4
    min_power: 0
    max_power: 1

  - platform: esp8266_pwm
    id: green_output
    pin: GPIO12
    min_power: 0
    max_power: 0.53

  - platform: esp8266_pwm
    id: blue_output
    pin: GPIO14
    min_power: 0
    max_power: 0.24

  - platform: esp8266_pwm
    id: white_output
    pin: GPIO5
    min_power: 0
    max_power: 1

  - platform: esp8266_pwm
    id: color_temperature
    inverted: true
    pin: GPIO13

light:
  - platform: rgbct
    id: rgbct_light
    default_transition_length: 500ms
    restore_mode: RESTORE_DEFAULT_ON
    red: red_output
    green: green_output
    blue: blue_output
    color_temperature: color_temperature
    white_brightness: white_output
    cold_white_color_temperature: 6500 K
    warm_white_color_temperature: 2000 K
    color_interlock: true

switch:
  - platform: template
    name: "Power"
    id: rgbct_light_power_switch
    icon: mdi:light-switch
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: ""
    device_class: switch
    lambda: |-
      bool is_on;
      id(rgbct_light).current_values_as_binary(&is_on);
      if (is_on) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - light.turn_on: rgbct_light
    turn_off_action:
      - light.turn_off: rgbct_light

  - platform: template
    name: "RGB"
    id: rgbct_light_rgb_switch
    icon: mdi:palette
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: ""
    device_class: switch
    lambda: |-
      ColorMode color_mode = id(rgbct_light).current_values.get_color_mode();
      if (color_mode == ColorMode::RGB)
        return true;
      return false;
    turn_on_action:
      then:
        - light.control:
            id: rgbct_light
            color_mode: RGB
    turn_off_action:
      then:
        - light.control:
            id: rgbct_light
            color_mode: COLOR_TEMPERATURE

number:
  - platform: template
    name: "Red"
    icon: mdi:palette
    entity_category: ""
    unit_of_measurement: "%"
    mode: slider
    min_value: 0
    max_value: 100
    step: 0.1
    lambda: |-
      return id(rgbct_light).current_values.get_red() * 100.0;
    update_interval: 2s
    set_action:
      - light.control:
          id: rgbct_light
          color_mode: RGB
          red: !lambda "return float(x) / 100.0;"

  - platform: template
    name: "Green"
    icon: mdi:palette
    entity_category: ""
    unit_of_measurement: "%"
    mode: slider
    min_value: 0
    max_value: 100
    step: 0.1
    lambda: |-
      return id(rgbct_light).current_values.get_green() * 100.0;
    update_interval: 2s
    set_action:
      - light.control:
          id: rgbct_light
          color_mode: RGB
          green: !lambda "return float(x) / 100.0;"

  - platform: template
    name: "Blue"
    icon: mdi:palette
    entity_category: ""
    unit_of_measurement: "%"
    mode: slider
    min_value: 0
    max_value: 100
    step: 0.1
    lambda: |-
      return id(rgbct_light).current_values.get_blue() * 100.0;
    update_interval: 2s
    set_action:
      - light.control:
          id: rgbct_light
          color_mode: RGB
          blue: !lambda "return float(x) / 100.0;"

  - platform: template
    name: "Color Temperature"
    icon: mdi:temperature-celsius
    entity_category: ""
    unit_of_measurement: "K"
    mode: slider
    min_value: 2000
    max_value: 6500
    step: 1
    lambda: |-
      return 1000000.0 / id(rgbct_light).current_values.get_color_temperature();
    update_interval: 2s
    set_action:
      - light.turn_on:
          id: rgbct_light
          color_mode: COLOR_TEMPERATURE
          color_temperature: !lambda |-
            return 1000000.0 / float(x);

  - platform: template
    name: "Brightness"
    icon: mdi:brightness-percent
    entity_category: ""
    unit_of_measurement: "%"
    mode: slider
    min_value: 0
    max_value: 100
    step: 0.1
    lambda: |-
      return id(rgbct_light).current_values.get_brightness() * 100.0;
    update_interval: 2s
    set_action:
      - light.turn_on:
          id: rgbct_light
          brightness: !lambda "return float(x) / 100.0;"
