    modbus_controller_id: s88_modbus_controller
    name: "S88: Pressure compensation"
    address: 3
    value_type: S_WORD
    unit_of_measurement: "hPa"
    multiply: 10
    min_value: 0
    step: 0.1
    max_value: 32767
    mode: box
    lambda: |-
      if(x<=0)
        return NAN;
      return x;

  # Default pressure (HR27)
