packages:
  - !include logger.yaml
  - !include wifi.yaml

binary_sensor:
  - platform: status
    name: "Status"

button:
  - platform: factory_reset
    id: button_factory_reset
    name: "Factory Reset"

  - platform: restart
    name: "Restart"

  - platform: safe_mode
    name: "Safe Mode"

  - platform: shutdown
    name: "Shutdown"

debug:

sensor:
  - platform: internal_temperature
    name: "Internal Temperature"

  - platform: uptime
    name: "Uptime"

  - platform: debug
    free:
      name: "Debug: Heap Free"
    block:
      name: "Debug: Heap Max Block"
    min_free:
      name: "Debug: Heap Min Free"
    fragmentation:
      name: "Debug: Heap Fragmentation"
    loop_time:
      name: "Debug: Loop Time"
    # psram:
    #   name: "Debug: Free PSRAM"
    cpu_frequency:
      name: "Debug: CPU Frequency"

text_sensor:
  - platform: uptime
    name: Uptime

  - platform: version
    name: "ESPHome Version"

  - platform: debug
    device:
      name: "Debug: Device"
    reset_reason:
      name: "Debug: Reset Reason"

factory_reset:
  resets_required: 5
  max_delay: 10s

safe_mode:

api:
  reboot_timeout: 0s
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}

captive_portal:
